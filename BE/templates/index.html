{% extends "base.html" %}

{% block content %}
    <body>
        <main>
            <section class="hero">
                <h1>Hungry Tracks Your Macros</h1>
                <p>Monitor your daily intake of calories, proteins, carbs, and fats based on your preferences.</p>
                <button onclick="location.href='login'" id="loginNowBtn">Login</button>
            </section>
            <section class="features">
                <div class="feature">
                    <h1>Connect With a Trainer</h1>
                    <button id="getStartedBtn">Coming soon...</button>
                </div>
                <div class="tracker">
                    <h1>Macro Quick Search</h1>
                    <div id="login-form">
                        <div class="input-section">
                            <div class="entryarea">
                                <input type="text" id="foodInput" required>
                                <div class="label-line-tracker">Enter a food item...</div>
                            </div>
                        </div>
                    </div>
                    <button id="searchButton">Search</button>
                </div>
            </section>
            <section class="results">
                <h2>Food Nutrition Information</h2>
                <div id="results"></div>
                    <template id="result-template">
                        <div class="food-card">
                            <h2></h2>
                            <p class="p-cals"></p>
                            <p class="p-prot"></p>
                            <p class="p-carbs"></p>
                            <p class="p-fats"></p>         
                        </div>
                    </template>

            </section>
        </main>

        <script src="{{ url_for('static', filename='config.js') }}"></script>
        <script src="{{ url_for('static', filename='index.js') }}"></script>

        {% endblock %}
