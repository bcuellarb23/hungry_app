{% extends "base.html" %}
{% block content %}
<body>
    <main>
        <section class="features">
            <div class="tracker">
                <h1>Look for a food</h1>
                <div id="login-form">
                    <div class="input-section">
                        <div class="entryarea">
                            <input type="text" id="foodInput" required>
                            <div class="label-line-tracker">Enter a food item...</div>
                        </div>
                    </div>
                </div>
                <button id="searchButton">Search</button>
                <h2>Or</h2>
                <button id="addButton">Add Manually</button>
            </div>
        </section> 
        <section class="results">
            <h2>Food Nutrition Information</h2>
            <div id="results"></div>

        </section>
    </main>
    <template id="Add-manually">
        <div class="add-food-form">
            <h4>Formulary here</h4>
        </div>
    </template>
    <template id="result-template">
        <div class="food-card">
            <h4></h4>
            <p class="p-cals"></p>
            <p class="p-prot"></p>
            <p class="p-carbs"></p>
            <p class="p-fats"></p>
            <div class="input-group">
                <label>Serving Size (g):</label>
                <input type="number" class="serving-size-input" value="100">
            </div>
            <button class="add-food-btn">Add to Diary</button>
        </div>
    </template>

    <script src="{{url_for('static', filename='config.js') }}"></script>
    <script src="{{url_for('static', filename='add_food.js') }}"></script>
</body>
{% endblock %}
